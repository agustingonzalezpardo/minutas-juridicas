<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minutas Jurídicas · Grabadora</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --navy: #0f1a2e;
  --gold: #b8942a;
  --cream: #f7f4ef;
  --paper: #ffffff;
  --rec: #dc2626;
  --dim: #94a3b8;
  --border: rgba(255,255,255,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--navy);
  color: var(--cream);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: rgba(0,0,0,0.2);
  flex-wrap: wrap;
}
.brand {
  font-family: 'EB Garamond', serif;
  font-size: 1.2rem;
  letter-spacing: 0.02em;
}
.brand em { color: var(--gold); font-style: normal; }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 2rem;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

.screen { display: none; width: 100%; }
.screen.active { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }

.wave-wrap {
  width: 100%;
  height: 80px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
canvas#waveform {
  width: 100%;
  height: 100%;
  display: block;
}
.wave-idle {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--dim);
  pointer-events: none;
}

.timer {
  font-size: 2.8rem;
  font-weight: 300;
  letter-spacing: 0.06em;
  font-variant-numeric: tabular-nums;
  margin-top: -0.5rem;
}
.timer-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: -0.8rem;
}
.timer-label.active { color: var(--rec); }

.rec-ring {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.rec-btn {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: var(--rec);
  font-size: 2rem;
  transition: transform 0.15s, background 0.2s;
  box-shadow: 0 0 0 0 rgba(220,38,38,0.3);
}
.rec-btn:hover { transform: scale(1.04); }
.rec-btn.recording {
  background: #b91c1c;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
  50% { box-shadow: 0 0 0 16px rgba(220,38,38,0); }
}
.rec-btn.processing {
  background: var(--gold);
  cursor: not-allowed;
  animation: none;
}

.status-line {
  font-size: 0.8rem;
  color: var(--dim);
  min-height: 1.2rem;
  text-align: center;
}
.status-line.recording { color: #fca5a5; }
.status-line.done { color: #86efac; }
.status-line.err { color: #fca5a5; }
.status-line.processing { color: var(--gold); }

.playback-wrap {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.8rem 1rem;
  display: none;
  flex-direction: column;
  gap: 0.4rem;
}
.playback-wrap.visible { display: flex; }
.playback-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dim);
}
audio { width: 100%; border-radius: 6px; }

.transcript-wrap {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: none;
}
.transcript-wrap.visible { display: block; }
.transcript-head {
  padding: 0.5rem 1rem;
  border-bottom: 1px solid var(--border);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dim);
  display: flex;
  justify-content: space-between;
}
.transcript-head span { color: #86efac; }
textarea#transcript {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  line-height: 1.6;
  padding: 0.8rem 1rem;
  resize: vertical;
  min-height: 100px;
}

.gen-btn {
  width: 100%;
  padding: 0.8rem;
  background: var(--gold);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  display: none;
}
.gen-btn.visible { display: block; }
.gen-btn:hover { opacity: 0.88; }

.new-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: 6px;
  padding: 0.4rem 1rem;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  display: none;
}
.new-btn.visible { display: inline-block; }
.new-btn:hover { border-color: var(--cream); color: var(--cream); }

.retry-btn {
  background: var(--gold);
  border: none;
  border-radius: 6px;
  color: white;
  padding: 0.4rem 1rem;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  display: none;
}
.retry-btn.visible { display: inline-block; }
.retry-btn:hover { opacity: 0.85; }

.minuta-screen {
  background: var(--paper);
  border-radius: 12px;
  overflow: hidden;
  width: 100%;
  color: var(--navy);
}
.minuta-toolbar {
  background: var(--navy);
  padding: 0.7rem 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.minuta-toolbar h2 {
  font-family: 'EB Garamond', serif;
  font-size: 1rem;
  color: var(--cream);
}
.toolbar-btns { display: flex; gap: 0.3rem; flex-wrap: wrap; }
.tbtn {
  padding: 0.3rem 0.8rem;
  border-radius: 5px;
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.tbtn-back {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--dim);
}
.tbtn-back:hover { border-color: var(--cream); color: var(--cream); }
.tbtn-copy {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--cream);
}
.tbtn-copy:hover { background: rgba(255,255,255,0.15); }
.tbtn-dl {
  background: var(--gold);
  border: none;
  color: white;
}
.tbtn-dl:hover { opacity: 0.88; }

.minuta-doc {
  padding: 1.5rem 2rem;
  font-family: 'EB Garamond', serif;
  font-size: 0.95rem;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 250px;
}
@media(max-width:520px){ .minuta-doc { padding: 1rem; } }

.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: #1e2d4a;
  color: var(--cream);
  border: 1px solid var(--gold);
  padding: 0.5rem 1.2rem;
  border-radius: 30px;
  font-size: 0.75rem;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 999;
}
.toast.show { opacity: 1; }

@media(max-width:480px){
  .rec-btn { width: 72px; height: 72px; font-size: 1.5rem; }
  .rec-ring { width: 90px; height: 90px; }
  .timer { font-size: 2.2rem; }
}
</style>
</head>
<body>
<header>
  <div class="brand">⚖ Minutas<em>Jurídicas</em></div>
</header>
<main>
  <div class="screen active" id="screen-rec">
    <div class="wave-wrap">
      <canvas id="waveform"></canvas>
      <div class="wave-idle" id="wave-idle">El audio aparecerá aquí al grabar</div>
    </div>
    <div class="timer" id="timer">00:00</div>
    <div class="timer-label" id="timer-label">Listo para grabar</div>
    <div class="rec-ring">
      <button class="rec-btn" id="rec-btn" onclick="toggleRecording()">🎙</button>
    </div>
    <div class="status-line" id="status">Presiona el botón para comenzar</div>
    <div class="playback-wrap" id="playback-wrap">
      <div class="playback-label">🎧 Escuchar grabación</div>
      <audio id="audio-player" controls></audio>
    </div>
    <div class="transcript-wrap" id="transcript-wrap">
      <div class="transcript-head">
        📝 Transcripción <span id="transcript-badge"></span>
      </div>
      <textarea id="transcript" placeholder="La transcripción aparecerá automáticamente al grabar…"></textarea>
    </div>
    <button class="retry-btn" id="retry-btn" onclick="retryTranscription()">🔄 Reintentar transcripción</button>
    <button class="gen-btn" id="gen-btn" onclick="generateMinuta()">Generar Minuta →</button>
    <button class="new-btn" id="new-btn" onclick="resetRecorder()">+ Nueva grabación</button>
  </div>
  <div class="screen" id="screen-minuta">
    <div class="minuta-screen">
      <div class="minuta-toolbar">
        <h2>📄 Minuta generada</h2>
        <div class="toolbar-btns">
          <button class="tbtn tbtn-back" onclick="showScreen('rec')">← Volver</button>
          <button class="tbtn tbtn-copy" onclick="copyMinuta()">Copiar</button>
          <button class="tbtn tbtn-dl" onclick="downloadMinuta()">⬇ .txt</button>
        </div>
      </div>
      <div class="minuta-doc" id="minuta-doc"></div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
// 1. CLAVES API FIJAS (YA INCLUIDAS)
// ════════════════════════════════════════════════════════════
const API_KEY_OPENAI = "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";
const API_KEY_ANTHROPIC = "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";

// ════════════════════════════════════════════════════════════
// 2. VARIABLES DE ESTADO
// ════════════════════════════════════════════════════════════
let mediaRecorder = null;
let audioChunks = [];
let audioBlob = null;
let timerInterval = null;
let seconds = 0;
let isRecording = false;
let audioCtx = null;
let analyser = null;
let waveRAF = null;
let micStream = null;

// ════════════════════════════════════════════════════════════
// 3. FUNCIONES DE PANTALLA
// ════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ════════════════════════════════════════════════════════════
// 4. WAVEFORM
// ════════════════════════════════════════════════════════════
function startWaveform(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);

  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  document.getElementById('wave-idle').style.display = 'none';

  function draw() {
    waveRAF = requestAnimationFrame(draw);
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const barW = (canvas.width / data.length) * 2.2;
    let x = 0;
    for (let i = 0; i < data.length; i++) {
      const h = (data[i] / 255) * canvas.height;
      const alpha = 0.4 + (data[i] / 255) * 0.6;
      ctx.fillStyle = `rgba(184,146,42,${alpha})`;
      ctx.fillRect(x, canvas.height - h, barW - 1, h);
      x += barW;
    }
  }
  draw();
}

function stopWaveform() {
  if (waveRAF) { cancelAnimationFrame(waveRAF); waveRAF = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('wave-idle').style.display = 'flex';
}

// ════════════════════════════════════════════════════════════
// 5. TIMER
// ════════════════════════════════════════════════════════════
function startTimer() {
  seconds = 0;
  updateTimerDisplay();
  timerInterval = setInterval(() => { seconds++; updateTimerDisplay(); }, 1000);
}
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}
function updateTimerDisplay() {
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  document.getElementById('timer').textContent = `${m}:${s}`;
}

// ════════════════════════════════════════════════════════════
// 6. GRABACIÓN
// ════════════════════════════════════════════════════════════
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  if (!navigator.mediaDevices) {
    setStatus('Tu navegador no soporta grabación.', 'err');
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    setStatus('Permiso de micrófono denegado.', 'err');
    return;
  }

  audioChunks = [];
  const mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4']
    .find(m => MediaRecorder.isTypeSupported(m)) || '';
  mediaRecorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = onRecordingStop;
  mediaRecorder.start(200);

  isRecording = true;
  startTimer();
  startWaveform(micStream);

  const btn = document.getElementById('rec-btn');
  btn.classList.add('recording');
  btn.textContent = '⏹';
  document.getElementById('timer-label').textContent = 'Grabando…';
  document.getElementById('timer-label').classList.add('active');
  setStatus('Grabando… Presiona ⏹ para detener', 'recording');
  document.getElementById('playback-wrap').classList.remove('visible');
  document.getElementById('transcript-wrap').classList.remove('visible');
  document.getElementById('gen-btn').classList.remove('visible');
  document.getElementById('new-btn').classList.remove('visible');
  document.getElementById('retry-btn').classList.remove('visible');
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  micStream?.getTracks().forEach(t => t.stop());
  stopTimer();
  stopWaveform();
  isRecording = false;

  const btn = document.getElementById('rec-btn');
  btn.classList.remove('recording');
  btn.classList.add('processing');
  btn.textContent = '⏳';
  document.getElementById('timer-label').textContent = 'Procesando…';
  document.getElementById('timer-label').classList.remove('active');
  setStatus('Procesando el audio…', 'processing');
}

// ════════════════════════════════════════════════════════════
// 7. onRecordingStop (CORREGIDO)
// ════════════════════════════════════════════════════════════
async function onRecordingStop() {
  audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });

  const player = document.getElementById('audio-player');
  player.src = URL.createObjectURL(audioBlob);
  document.getElementById('playback-wrap').classList.add('visible');

  const btn = document.getElementById('rec-btn');
  btn.classList.remove('processing');
  btn.textContent = '🎙';
  document.getElementById('new-btn').classList.add('visible');

  // Mostrar área de transcripción y botón de generar
  document.getElementById('transcript-wrap').classList.add('visible');
  document.getElementById('gen-btn').classList.add('visible');

  // Verificar que la clave de OpenAI no sea la de ejemplo
  if (!API_KEY_OPENAI || API_KEY_OPENAI.length < 20) {
    setStatus('❌ Clave de OpenAI no configurada o incompleta.', 'err');
    document.getElementById('transcript-badge').textContent = '⚠️ Sin clave';
    return;
  }

  // Intentar transcripción automática
  setStatus('🔊 Transcribiendo con OpenAI Whisper…', 'processing');
  document.getElementById('transcript-badge').textContent = '⏳ Transcribiendo…';
  try {
    const transcript = await Promise.race([
      transcribeAudio(audioBlob),
      new Promise((_, reject) => setTimeout(() => reject(new Error('⏰ Tiempo de espera agotado (30s)')), 30000))
    ]);
    document.getElementById('transcript').value = transcript;
    document.getElementById('transcript-badge').textContent = '✓ Lista';
    setStatus('✅ Transcripción automática completada.', 'done');
    document.getElementById('retry-btn').classList.remove('visible');
  } catch (e) {
    console.error('❌ Error en onRecordingStop:', e);
    setStatus(`❌ Error: ${e.message}`, 'err');
    document.getElementById('transcript-badge').textContent = '⚠️ Falló';
    document.getElementById('retry-btn').classList.add('visible');
  }
}

// ════════════════════════════════════════════════════════════
// 8. TRANSCRIPCIÓN CON OPENAI (CORREGIDA Y ROBUSTA)
// ════════════════════════════════════════════════════════════
async function transcribeAudio(blob) {
  // Validar clave
  if (!API_KEY_OPENAI || API_KEY_OPENAI.length < 20) {
    throw new Error('❌ La clave de OpenAI no es válida. Reemplázala en el código.');
  }

  // Crear FormData
  const formData = new FormData();
  // Forzar el nombre del archivo con extensión .webm (Whisper lo soporta)
  formData.append('file', blob, 'audio.webm');
  formData.append('model', 'whisper-1');
  formData.append('language', 'es');
  formData.append('response_format', 'json');

  console.log('📤 Enviando audio a OpenAI. Tamaño:', blob.size, 'Tipo:', blob.type);

  try {
    const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${API_KEY_OPENAI}` },
      body: formData
    });

    console.log('📥 Respuesta de OpenAI:', res.status, res.statusText);

    if (!res.ok) {
      let errorMsg = `Error HTTP ${res.status}`;
      try {
        const errorData = await res.json();
        console.error('❌ Error detallado de OpenAI:', errorData);
        errorMsg = errorData?.error?.message || errorMsg;
      } catch (e) {
        // Si no se puede parsear JSON, usamos el texto
        const text = await res.text();
        console.error('❌ Respuesta no JSON:', text);
        errorMsg = text || errorMsg;
      }
      throw new Error(errorMsg);
    }

    const data = await res.json();
    console.log('✅ Transcripción recibida:', data);
    return data.text || '';
  } catch (error) {
    console.error('❌ Falló la transcripción:', error);
    throw error;
  }
}

// ════════════════════════════════════════════════════════════
// 9. REINTENTAR TRANSCRIPCIÓN
// ════════════════════════════════════════════════════════════
async function retryTranscription() {
  if (!audioBlob) {
    showToast('No hay audio grabado. Graba primero.');
    return;
  }
  document.getElementById('retry-btn').classList.remove('visible');
  setStatus('Reintentando transcripción…', 'processing');
  document.getElementById('transcript-badge').textContent = '⏳ Reintentando…';
  try {
    const transcript = await Promise.race([
      transcribeAudio(audioBlob),
      new Promise((_, reject) => setTimeout(() => reject(new Error('Tiempo agotado')), 30000))
    ]);
    document.getElementById('transcript').value = transcript;
    document.getElementById('transcript-badge').textContent = '✓ Lista';
    setStatus('Transcripción completada.', 'done');
  } catch (e) {
    setStatus(`❌ Error: ${e.message}`, 'err');
    document.getElementById('transcript-badge').textContent = '⚠️ Falló';
    document.getElementById('retry-btn').classList.add('visible');
  }
}

// ════════════════════════════════════════════════════════════
// 10. GENERAR MINUTA CON ANTHROPIC
// ════════════════════════════════════════════════════════════
async function generateMinuta() {
  const transcript = document.getElementById('transcript').value.trim();
  if (!transcript) {
    showToast('Primero transcribe el audio.');
    return;
  }

  const btn = document.getElementById('gen-btn');
  btn.textContent = '⏳ Generando…';
  btn.disabled = true;
  setStatus('Generando minuta jurídica…', 'processing');

  const fecha = new Date().toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const hora = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY_ANTHROPIC,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        system: `Eres un abogado chileno experto en redactar minutas de audiencia de juicio.
A partir de la transcripción, extrae la información relevante y redacta una minuta formal.

La minuta DEBE tener exactamente este formato:

================================================================
      MINUTA DE AUDIENCIA DE JUICIO — PARTE DEMANDANTE
================================================================
Fecha: ${fecha}     Hora: ${hora}

DATOS DEL CLIENTE
────────────────────────────────────────────────────────────────
Cliente  : [nombre]
Abogado  : [nombre]
Correo   : [correo]
Teléfono : [teléfono]

ANTECEDENTES DEL PROCEDIMIENTO
────────────────────────────────────────────────────────────────
Procedimiento : [tipo]
Materia       : [materia]
RIT           : [RIT]
Caratulado    : [caratulado]
Tribunal      : [tribunal]
Demandante    : [nombre]
Demandado     : [nombre]

I. HECHOS PACÍFICOS
────────────────────────────────────────────────────────────────
  1. [hecho]
  2. [hecho]

II. HECHOS CONTROVERTIDOS
────────────────────────────────────────────────────────────────
  1. [hecho]
  2. [hecho]

III. SOLICITUD DE ALIMENTOS
────────────────────────────────────────────────────────────────
Monto solicitado: [monto]
Necesidades del alimentario:
  − [necesidad]
  − [necesidad]

IV. PRUEBA OFRECIDA
────────────────────────────────────────────────────────────────
A. DOCUMENTAL
  − [documento]
B. PERICIAL
  − [pericia]
C. TESTIMONIAL
  − [punto testimonial]

V. PUNTOS DE PRUEBA PENDIENTES
────────────────────────────────────────────────────────────────
  1. [punto]
  2. [punto]

ACUERDOS Y TAREAS PENDIENTES
────────────────────────────────────────────────────────────────
Acuerdos         : [acuerdos]
Tareas pendientes: [tareas]

================================================================

Responde SOLO con la minuta, sin explicaciones adicionales.`,
        messages: [{ role: 'user', content: `Aquí está la transcripción:\n\n${transcript}` }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Error ${res.status}`);
    }
    const data = await res.json();
    const minutaText = data.content?.map(c => c.text || '').join('').trim();

    document.getElementById('minuta-doc').textContent = minutaText;
    btn.textContent = 'Generar Minuta →';
    btn.disabled = false;
    setStatus('Minuta generada ✓', 'done');
    showScreen('minuta');

  } catch (e) {
    // Fallback: minuta básica
    const minutaText = buildBasicMinuta(transcript, fecha, hora);
    document.getElementById('minuta-doc').textContent = minutaText;
    btn.textContent = 'Generar Minuta →';
    btn.disabled = false;
    setStatus('Minuta generada (modo básico)', 'done');
    showScreen('minuta');
    showToast('⚠️ Error con IA, minuta básica generada.');
  }
}

function buildBasicMinuta(transcript, fecha, hora) {
  return `================================================================
      MINUTA DE AUDIENCIA DE JUICIO — PARTE DEMANDANTE
================================================================
Fecha: ${fecha}     Hora: ${hora}

TRANSCRIPCIÓN DE LA REUNIÓN
────────────────────────────────────────────────────────────────
${transcript}
================================================================`;
}

// ════════════════════════════════════════════════════════════
// 11. UTILIDADES
// ════════════════════════════════════════════════════════════
function resetRecorder() {
  audioBlob = null;
  audioChunks = [];
  document.getElementById('audio-player').src = '';
  document.getElementById('transcript').value = '';
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('timer-label').textContent = 'Listo para grabar';
  document.getElementById('timer-label').classList.remove('active');
  document.getElementById('playback-wrap').classList.remove('visible');
  document.getElementById('transcript-wrap').classList.remove('visible');
  document.getElementById('gen-btn').classList.remove('visible');
  document.getElementById('new-btn').classList.remove('visible');
  document.getElementById('retry-btn').classList.remove('visible');
  document.getElementById('transcript-badge').textContent = '';
  document.getElementById('wave-idle').style.display = 'flex';
  setStatus('Presiona el botón para comenzar', '');
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = `status-line ${type || ''}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function copyMinuta() {
  navigator.clipboard.writeText(document.getElementById('minuta-doc').textContent)
    .then(() => showToast('Copiado ✓'));
}

function downloadMinuta() {
  const txt = document.getElementById('minuta-doc').textContent;
  const date = new Date().toLocaleDateString('es-CL').replace(/\//g, '-');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
  a.download = `minuta_${date}.txt`;
  a.click();
}
</script>
</body>
</html>
