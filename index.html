<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minutas Jurídicas · Estudio Legal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --primary: #0a1628;
      --primary-light: #13203a;
      --accent: #c9a84c;
      --accent-light: #dbb95c;
      --bg: #f3f5f8;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e9edf2;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 20px 60px rgba(0, 0, 0, 0.08);
      --radius: 20px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'EB Garamond', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .logo-icon {
      font-size: 1.5rem;
      color: var(--accent);
    }
    .logo span {
      color: var(--accent);
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav a {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition), border-color var(--transition);
      border-bottom: 2px solid transparent;
      padding-bottom: 0.25rem;
    }
    .nav a:hover,
    .nav a.active {
      color: var(--primary);
      border-bottom-color: var(--accent);
    }

    /* ─── MAIN ─── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 3rem;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.2rem 2.5rem;
      border: 1px solid var(--border);
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .card-header h2 {
      font-family: 'EB Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: -0.01em;
    }
    .card-header .badge {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      background: #faf7ed;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      border: 1px solid #ece3d0;
      letter-spacing: 0.03em;
    }

    /* ─── WAVEFORM ─── */
    .wave-wrap {
      width: 100%;
      height: 84px;
      background: #f8f9fb;
      border-radius: var(--radius-sm);
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
    }
    canvas#waveform {
      width: 100%;
      height: 100%;
      display: block;
    }
    .wave-idle {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: #b0b8c4;
      pointer-events: none;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* ─── TIMER ─── */
    .timer-wrapper {
      text-align: center;
      padding: 0.6rem 0 0.2rem;
    }
    .timer {
      font-size: 3.2rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      font-variant-numeric: tabular-nums;
      color: var(--primary);
      line-height: 1.2;
    }
    .timer-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: -0.2rem;
    }
    .timer-label.active {
      color: #b34a4a;
    }

    /* ─── BOTÓN GRABAR ─── */
    .rec-ring {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0.75rem auto;
      background: #fafbfc;
      transition: border-color var(--transition);
    }
    .rec-ring:hover {
      border-color: var(--primary-light);
    }

    .rec-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--primary);
      font-size: 2.4rem;
      color: white;
      transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(10, 22, 40, 0.18);
    }
    .rec-btn:hover {
      transform: scale(1.04);
      background: #0d2a4a;
    }
    .rec-btn:active {
      transform: scale(0.94);
    }

    .rec-btn.recording {
      background: #b34a4a;
      animation: pulse-big 1.4s ease-in-out infinite;
    }
    @keyframes pulse-big {
      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(179, 74, 74, 0.3);
      }
      50% {
        box-shadow: 0 0 0 24px rgba(179, 74, 74, 0);
      }
    }

    .rec-btn.processing {
      background: var(--accent);
      cursor: not-allowed;
      animation: none;
      box-shadow: none;
    }

    /* ─── STATUS ─── */
    .status-line {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
      min-height: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      padding: 0 0.5rem;
    }
    .status-line.recording {
      color: #b34a4a;
    }
    .status-line.done {
      color: #2d7d46;
    }
    .status-line.err {
      color: #b34a4a;
    }
    .status-line.processing {
      color: var(--accent);
    }

    /* ─── PLAYBACK ─── */
    .playback-wrap {
      display: none;
      flex-direction: column;
      gap: 0.3rem;
      padding: 0.8rem 1rem;
      background: #f8f9fb;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin-top: 0.75rem;
    }
    .playback-wrap.visible {
      display: flex;
    }
    .playback-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    audio {
      width: 100%;
      border-radius: 6px;
      outline: none;
      background: #f1f3f5;
    }

    /* ─── TRANSCRIPT ─── */
    .transcript-wrap {
      display: none;
      overflow: hidden;
      border-radius: var(--radius-sm);
      background: #f8f9fb;
      border: 1px solid var(--border);
      margin-top: 0.75rem;
    }
    .transcript-wrap.visible {
      display: block;
    }

    .transcript-head {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .transcript-head span {
      color: #2d7d46;
      font-weight: 600;
    }

    textarea#transcript {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      line-height: 1.75;
      padding: 0.9rem 1rem;
      resize: vertical;
      min-height: 130px;
    }
    textarea#transcript::placeholder {
      color: #b0b8c4;
      font-weight: 300;
    }

    /* ─── BOTONES ─── */
    .btn-primary {
      width: 100%;
      padding: 0.95rem;
      background: var(--primary);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      display: none;
      letter-spacing: 0.02em;
    }
    .btn-primary.visible {
      display: block;
    }
    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(10, 22, 40, 0.12);
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 0.5rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      display: none;
    }
    .btn-secondary.visible {
      display: inline-block;
    }
    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-retry {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      padding: 0.5rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: opacity var(--transition);
    }
    .btn-retry.visible {
      display: inline-block;
    }
    .btn-retry:hover {
      opacity: 0.85;
    }

    .btn-group {
      display: flex;
      gap: 0.6rem;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.25rem;
    }

    /* ─── SCREENS ─── */
    .screen {
      display: none;
      animation: fadeUp 0.4s ease;
    }
    .screen.active {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── MINUTA ─── */
    .minuta-screen .card {
      padding: 0;
      overflow: hidden;
    }

    .minuta-toolbar {
      background: var(--primary);
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .minuta-toolbar h2 {
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem;
      color: white;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .minuta-toolbar .actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .minuta-toolbar .actions button {
      padding: 0.3rem 1rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.75);
    }
    .minuta-toolbar .actions button:hover {
      background: rgba(255, 255, 255, 0.16);
      color: white;
    }
    .minuta-toolbar .actions .btn-back {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .minuta-toolbar .actions .btn-back:hover {
      border-color: white;
    }
    .minuta-toolbar .actions .btn-download {
      background: var(--accent);
      color: white;
    }
    .minuta-toolbar .actions .btn-download:hover {
      opacity: 0.85;
    }

    .minuta-doc {
      padding: 2.2rem 2.5rem;
      font-family: 'EB Garamond', serif;
      font-size: 1.05rem;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 280px;
      background: var(--card-bg);
      color: var(--text);
    }
    @media (max-width: 600px) {
      .minuta-doc {
        padding: 1.2rem 1.5rem;
        font-size: 0.95rem;
      }
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: white;
      padding: 0.6rem 1.8rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
      z-index: 999;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 90%;
      letter-spacing: 0.01em;
    }
    .toast.show {
      opacity: 1;
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--card-bg);
      padding: 1.2rem 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      margin-top: 1rem;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      header {
        padding: 0.6rem 1rem;
      }
      .logo {
        font-size: 1.2rem;
      }
      .nav {
        gap: 1rem;
      }
      .nav a {
        font-size: 0.75rem;
      }
      .card {
        padding: 1.2rem 1rem;
      }
      .timer {
        font-size: 2.4rem;
      }
      .rec-btn {
        width: 80px;
        height: 80px;
        font-size: 1.8rem;
      }
      .rec-ring {
        width: 110px;
        height: 110px;
      }
      main {
        padding: 1.2rem 0.8rem;
      }
      .card-header h2 {
        font-size: 1.1rem;
      }
      .minuta-toolbar {
        padding: 0.6rem 1rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">
      <span class="logo-icon">⚖</span>
      Minutas<span>Jurídicas</span>
    </a>
    <div class="nav">
      <a href="#" class="active">Inicio</a>
      <a href="#">Mis Minutas</a>
      <a href="#">Ayuda</a>
    </div>
  </header>

  <main>

    <!-- ─── PANTALLA GRABADORA ─── -->
    <div id="screen-rec" class="screen active">
      <div class="card">
        <div class="card-header">
          <h2>🎙️ Grabar Audiencia</h2>
          <span class="badge">● Listo</span>
        </div>

        <div class="wave-wrap">
          <canvas id="waveform"></canvas>
          <div class="wave-idle" id="waveIdle">El audio aparecerá aquí</div>
        </div>

        <div class="timer-wrapper">
          <div class="timer" id="timer">00:00</div>
          <div class="timer-label" id="timerLabel">Listo para grabar</div>
        </div>

        <div style="text-align:center;">
          <div class="rec-ring">
            <button class="rec-btn" id="recBtn" onclick="toggleRecording()">🎙</button>
          </div>
        </div>

        <div class="status-line" id="status">Presiona el botón para comenzar</div>

        <div class="playback-wrap" id="playbackWrap">
          <div class="playback-label">🎧 Escuchar grabación</div>
          <audio id="audioPlayer" controls></audio>
        </div>

        <div class="transcript-wrap" id="transcriptWrap">
          <div class="transcript-head">
            📝 Transcripción <span id="transcriptBadge"></span>
          </div>
          <textarea id="transcript" placeholder="La transcripción aparecerá automáticamente…"></textarea>
        </div>

        <div class="btn-group">
          <button class="btn-retry" id="retryBtn" onclick="retryTranscription()">🔄 Reintentar</button>
        </div>
        <button class="btn-primary" id="genBtn" onclick="generateMinuta()">Generar Minuta →</button>
        <button class="btn-secondary" id="newBtn" onclick="resetRecorder()">+ Nueva grabación</button>
      </div>
    </div>

    <!-- ─── PANTALLA MINUTA ─── -->
    <div id="screen-minuta" class="screen">
      <div class="minuta-screen">
        <div class="card">
          <div class="minuta-toolbar">
            <h2>📄 Minuta generada</h2>
            <div class="actions">
              <button class="btn-back" onclick="showScreen('rec')">← Volver</button>
              <button onclick="copyMinuta()">Copiar</button>
              <button class="btn-download" onclick="downloadMinuta()">⬇ .txt</button>
            </div>
          </div>
          <div class="minuta-doc" id="minutaDoc"></div>
        </div>
      </div>
    </div>

  </main>

  <footer>
    &copy; 2026 Minutas Jurídicas — Tecnología para el derecho
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    // ════════════════════════════════════════════════════════════
    // 1. STATE
    // ════════════════════════════════════════════════════════════
    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let timerInterval = null;
    let seconds = 0;
    let isRecording = false;
    let audioCtx = null;
    let analyser = null;
    let waveRAF = null;
    let micStream = null;

    // ════════════════════════════════════════════════════════════
    // 2. UI HELPERS
    // ════════════════════════════════════════════════════════════
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(`screen-${id}`).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status-line ${type || ''}`;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timeout);
      t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ════════════════════════════════════════════════════════════
    // 3. WAVEFORM
    // ════════════════════════════════════════════════════════════
    function startWaveform(stream) {
      audioCtx = new(window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      const src = audioCtx.createMediaStreamSource(stream);
      src.connect(analyser);

      const canvas = document.getElementById('waveform');
      const ctx = canvas.getContext('2d');
      document.getElementById('waveIdle').style.display = 'none';

      function draw() {
        waveRAF = requestAnimationFrame(draw);
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const barW = (canvas.width / data.length) * 2.2;
        let x = 0;
        for (let i = 0; i < data.length; i++) {
          const h = (data[i] / 255) * canvas.height;
          const alpha = 0.4 + (data[i] / 255) * 0.6;
          ctx.fillStyle = `rgba(201, 168, 76, ${alpha})`;
          ctx.fillRect(x, canvas.height - h, barW - 1, h);
          x += barW;
        }
      }
      draw();
    }

    function stopWaveform() {
      if (waveRAF) { cancelAnimationFrame(waveRAF);
        waveRAF = null; }
      if (audioCtx) { audioCtx.close();
        audioCtx = null; }
      const canvas = document.getElementById('waveform');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      document.getElementById('waveIdle').style.display = 'flex';
    }

    // ════════════════════════════════════════════════════════════
    // 4. TIMER
    // ════════════════════════════════════════════════════════════
    function startTimer() {
      seconds = 0;
      updateTimerDisplay();
      timerInterval = setInterval(() => { seconds++;
        updateTimerDisplay(); }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function updateTimerDisplay() {
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    // ════════════════════════════════════════════════════════════
    // 5. RECORDING
    // ════════════════════════════════════════════════════════════
    async function toggleRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    }

    async function startRecording() {
      if (!navigator.mediaDevices) {
        setStatus('Tu navegador no soporta grabación.', 'err');
        return;
      }
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        setStatus('Permiso de micrófono denegado.', 'err');
        return;
      }

      audioChunks = [];
      const mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4']
        .find(m => MediaRecorder.isTypeSupported(m)) || '';
      mediaRecorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = onRecordingStop;
      mediaRecorder.start(200);

      isRecording = true;
      startTimer();
      startWaveform(micStream);

      const btn = document.getElementById('recBtn');
      btn.classList.add('recording');
      btn.textContent = '⏹';
      document.getElementById('timerLabel').textContent = 'Grabando…';
      document.getElementById('timerLabel').classList.add('active');
      setStatus('Grabando… Presiona ⏹ para detener', 'recording');
      document.getElementById('playbackWrap').classList.remove('visible');
      document.getElementById('transcriptWrap').classList.remove('visible');
      document.getElementById('genBtn').classList.remove('visible');
      document.getElementById('newBtn').classList.remove('visible');
      document.getElementById('retryBtn').classList.remove('visible');
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      micStream?.getTracks().forEach(t => t.stop());
      stopTimer();
      stopWaveform();
      isRecording = false;

      const btn = document.getElementById('recBtn');
      btn.classList.remove('recording');
      btn.classList.add('processing');
      btn.textContent = '⏳';
      document.getElementById('timerLabel').textContent = 'Procesando…';
      document.getElementById('timerLabel').classList.remove('active');
      setStatus('Procesando el audio…', 'processing');
    }

    // ════════════════════════════════════════════════════════════
    // 6. WHISPER TRANSCRIPTION (backend Vercel)
    // ════════════════════════════════════════════════════════════
    async function transcribeWithWhisper(blob) {
      const formData = new FormData();
      const extension = blob.type.includes('mp4') ? 'm4a' : 'webm';
      formData.append('file', blob, `audio.${extension}`);
      formData.append('model', 'whisper-1');
      formData.append('language', 'es');

      const res = await fetch('/api/transcribe', {
        method: 'POST',
        body: formData
      });

      if (!res.ok) {
        const error = await res.json();
        throw new Error(error?.error || `Error ${res.status}`);
      }

      const data = await res.json();
      return data.text || '';
    }

    // ════════════════════════════════════════════════════════════
    // 7. onRecordingStop
    // ════════════════════════════════════════════════════════════
    async function onRecordingStop() {
      audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });

      const player = document.getElementById('audioPlayer');
      player.src = URL.createObjectURL(audioBlob);
      document.getElementById('playbackWrap').classList.add('visible');

      const btn = document.getElementById('recBtn');
      btn.classList.remove('processing');
      btn.textContent = '🎙';
      document.getElementById('newBtn').classList.add('visible');

      document.getElementById('transcriptWrap').classList.add('visible');
      document.getElementById('genBtn').classList.add('visible');

      setStatus('🔊 Transcribiendo con IA (Whisper)…', 'processing');
      document.getElementById('transcriptBadge').textContent = '⏳ Transcribiendo…';
      try {
        const transcript = await Promise.race([
          transcribeWithWhisper(audioBlob),
          new Promise((_, reject) => setTimeout(() => reject(new Error('⏰ Tiempo de espera agotado (60s)')), 60000))
        ]);
        document.getElementById('transcript').value = transcript;
        document.getElementById('transcriptBadge').textContent = '✓ Lista';
        setStatus('✅ Transcripción completada.', 'done');
        document.getElementById('retryBtn').classList.remove('visible');
      } catch (e) {
        console.error('Error:', e);
        setStatus(`❌ ${e.message}`, 'err');
        document.getElementById('transcriptBadge').textContent = '⚠️ Falló';
        document.getElementById('transcript').value = `Error: ${e.message}\n\nPuedes escribir manualmente o presionar "Reintentar".`;
        document.getElementById('retryBtn').classList.add('visible');
      }
    }

    // ════════════════════════════════════════════════════════════
    // 8. RETRY
    // ════════════════════════════════════════════════════════════
    async function retryTranscription() {
      if (!audioBlob) {
        showToast('No hay audio grabado.');
        return;
      }
      document.getElementById('retryBtn').classList.remove('visible');
      document.getElementById('transcriptBadge').textContent = '⏳ Reintentando…';
      setStatus('🔊 Reintentando transcripción con IA…', 'processing');
      try {
        const transcript = await Promise.race([
          transcribeWithWhisper(audioBlob),
          new Promise((_, reject) => setTimeout(() => reject(new Error('Tiempo agotado')), 60000))
        ]);
        document.getElementById('transcript').value = transcript;
        document.getElementById('transcriptBadge').textContent = '✓ Lista';
        setStatus('✅ Transcripción completada.', 'done');
      } catch (e) {
        setStatus(`❌ ${e.message}`, 'err');
        document.getElementById('transcriptBadge').textContent = '⚠️ Falló';
        document.getElementById('transcript').value = `Error: ${e.message}\n\nEscribe manualmente.`;
        document.getElementById('retryBtn').classList.add('visible');
      }
    }

    // ════════════════════════════════════════════════════════════
    // 9. GENERATE MINUTA
    // ════════════════════════════════════════════════════════════
    async function generateMinuta() {
      const transcript = document.getElementById('transcript').value.trim();
      if (!transcript) {
        showToast('Primero transcribe el audio o escribe el texto.');
        return;
      }

      const btn = document.getElementById('genBtn');
      btn.textContent = '⏳ Generando…';
      btn.disabled = true;
      setStatus('Generando minuta jurídica…', 'processing');

      const fecha = new Date().toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const hora = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });

      try {
        const res = await fetch('/api/minuta', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcript, fecha, hora })
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error?.error || `Error ${res.status}`);
        }

        const data = await res.json();
        const minutaText = data.minuta || '';
        if (!minutaText) throw new Error('La minuta generada está vacía.');

        document.getElementById('minutaDoc').textContent = minutaText;
        btn.textContent = 'Generar Minuta →';
        btn.disabled = false;
        setStatus('Minuta generada ✓', 'done');
        showScreen('minuta');
      } catch (e) {
        console.error('Error al generar minuta:', e);
        const minutaText = buildBasicMinuta(transcript, fecha, hora);
        document.getElementById('minutaDoc').textContent = minutaText;
        btn.textContent = 'Generar Minuta →';
        btn.disabled = false;
        setStatus('Minuta generada (modo básico)', 'done');
        showScreen('minuta');
        showToast('⚠️ Error con IA, minuta básica generada.');
      }
    }

    function buildBasicMinuta(transcript, fecha, hora) {
      return `================================================================
      MINUTA DE AUDIENCIA DE JUICIO — PARTE DEMANDANTE
================================================================
Fecha: ${fecha}     Hora: ${hora}

TRANSCRIPCIÓN DE LA REUNIÓN
────────────────────────────────────────────────────────────────
${transcript}
================================================================`;
    }

    // ════════════════════════════════════════════════════════════
    // 10. UTILITIES
    // ════════════════════════════════════════════════════════════
    function resetRecorder() {
      audioBlob = null;
      audioChunks = [];
      document.getElementById('audioPlayer').src = '';
      document.getElementById('transcript').value = '';
      document.getElementById('timer').textContent = '00:00';
      document.getElementById('timerLabel').textContent = 'Listo para grabar';
      document.getElementById('timerLabel').classList.remove('active');
      document.getElementById('playbackWrap').classList.remove('visible');
      document.getElementById('transcriptWrap').classList.remove('visible');
      document.getElementById('genBtn').classList.remove('visible');
      document.getElementById('newBtn').classList.remove('visible');
      document.getElementById('retryBtn').classList.remove('visible');
      document.getElementById('transcriptBadge').textContent = '';
      document.getElementById('waveIdle').style.display = 'flex';
      setStatus('Presiona el botón para comenzar', '');
    }

    function copyMinuta() {
      const text = document.getElementById('minutaDoc').textContent;
      if (!text) { showToast('No hay minuta para copiar.'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('Copiado ✓'));
    }

    function downloadMinuta() {
      const text = document.getElementById('minutaDoc').textContent;
      if (!text) { showToast('No hay minuta para descargar.'); return; }
      const date = new Date().toLocaleDateString('es-CL').replace(/\//g, '-');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain;charset=utf-8' }));
      a.download = `minuta_${date}.txt`;
      a.click();
    }
  </script>
</body>
