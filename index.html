<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minutas Jurídicas · Estudio Legal</title>
  <style>
    /* ─── IMPORTACIÓN DE FUENTES ─── */
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

    /* ─── VARIABLES (PALETA CORPORATIVA) ─── */
    :root {
      --primary: #0a1628;          /* Azul marino muy oscuro */
      --primary-light: #13203a;    /* Azul un poco más claro */
      --accent: #c9a84c;           /* Dorado principal */
      --accent-light: #dbb95c;     /* Dorado más claro */
      --bg: #f3f5f8;               /* Fondo gris claro */
      --card-bg: #ffffff;          /* Fondo de tarjetas blanco */
      --text: #1e293b;             /* Texto principal casi negro */
      --text-muted: #64748b;       /* Texto secundario gris */
      --border: #e9edf2;           /* Bordes grises */
      --shadow: 0 10px 40px rgba(0,0,0,0.05);
      --shadow-hover: 0 20px 60px rgba(0,0,0,0.08);
      --radius: 20px;
      --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ─── RESET Y ESTILOS BASE ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'EB Garamond', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .logo-icon {
      font-size: 1.5rem;
      color: var(--accent);
    }
    .logo span { color: var(--accent); }

    .nav {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav a {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition), border-color var(--transition);
      border-bottom: 2px solid transparent;
      padding-bottom: 0.25rem;
    }
    .nav a:hover,
    .nav a.active {
      color: var(--primary);
      border-bottom-color: var(--accent);
    }

    /* ─── MAIN ─── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 3rem;
    }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      padding: 2rem 1rem 1.5rem;
    }
    .hero h1 {
      font-family: 'EB Garamond', serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .hero h1 span {
      color: var(--accent);
    }
    .hero p {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0.5rem auto 0;
      font-weight: 300;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.2rem 2.5rem;
      border: 1px solid var(--border);
      transition: box-shadow var(--transition), transform var(--transition);
      /* EFECTO 3D CON PERSPECTIVA */
      transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1);
      transform-style: preserve-3d;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: perspective(1000px) rotateX(1.5deg) rotateY(1.5deg) scale(1.01);
    }

    /* ─── EL RESTO DE LA APP (WAVEFORM, TIMER, BOTÓN GRABAR, ETC.) ─── */
    /* Coloca aquí todo el código que ya tenías para la grabadora y minuta */
    /* Puedes copiarlo de la versión anterior, pero asegúrate de que las clases coincidan */

    /* ─── BOTONES CON EFECTO 3D ─── */
    .btn-primary {
      width: 100%;
      padding: 0.95rem;
      background: var(--primary);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: none;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 12px rgba(10,22,40,0.15);
      transform: perspective(600px) translateZ(0);
    }
    .btn-primary.visible { display: block; }
    .btn-primary:hover {
      background: var(--primary-light);
      transform: perspective(600px) translateZ(8px) scale(1.01);
      box-shadow: 0 8px 24px rgba(10,22,40,0.2);
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--card-bg);
      padding: 1.2rem 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      margin-top: 1rem;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      header { padding: 0.6rem 1rem; }
      .logo { font-size: 1.2rem; }
      .nav { gap: 1rem; }
      .nav a { font-size: 0.75rem; }
      .card { padding: 1.2rem 1rem; }
      .hero h1 { font-size: 2rem; }
      .hero p { font-size: 0.9rem; }
      main { padding: 1.2rem 0.8rem; }
    }
  </style>
</head>

  <footer>
