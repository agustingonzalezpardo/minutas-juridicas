<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minutas Jurídicas · Grabadora</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --navy: #0f1a2e;
  --gold: #b8942a;
  --cream: #f7f4ef;
  --paper: #ffffff;
  --rec: #dc2626;
  --dim: #94a3b8;
  --border: rgba(255,255,255,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--navy);
  color: var(--cream);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: rgba(0,0,0,0.2);
  flex-wrap: wrap;
  gap: 0.8rem;
}
.brand {
  font-family: 'EB Garamond', serif;
  font-size: 1.2rem;
  letter-spacing: 0.02em;
}
.brand em { color: var(--gold); font-style: normal; }

#key-area {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.key-pill {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0.2rem 0.2rem 0.2rem 0.7rem;
  flex-wrap: wrap;
}
.key-pill input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--cream);
  font-family: monospace;
  font-size: 0.7rem;
  width: 120px;
}
.key-pill input::placeholder { color: var(--dim); }
.key-btn {
  background: var(--gold);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 0.2rem 0.6rem;
  font-size: 0.65rem;
  font-weight: 700;
  cursor: pointer;
}
.key-btn:hover { opacity: 0.85; }
#key-status {
  display: none;
  font-size: 0.75rem;
  color: #86efac;
  font-weight: 500;
}
#key-status.visible { display: block; }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 2rem;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

.screen { display: none; width: 100%; }
.screen.active { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }

.wave-wrap {
  width: 100%;
  height: 80px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
canvas#waveform {
  width: 100%;
  height: 100%;
  display: block;
}
.wave-idle {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--dim);
  pointer-events: none;
}

.timer {
  font-size: 2.8rem;
  font-weight: 300;
  letter-spacing: 0.06em;
  font-variant-numeric: tabular-nums;
  margin-top: -0.5rem;
}
.timer-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: -0.8rem;
}
.timer-label.active { color: var(--rec); }

.rec-ring {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.rec-btn {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: var(--rec);
  font-size: 2rem;
  transition: transform 0.15s, background 0.2s;
  box-shadow: 0 0 0 0 rgba(220,38,38,0.3);
}
.rec-btn:hover { transform: scale(1.04); }
.rec-btn.recording {
  background: #b91c1c;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
  50% { box-shadow: 0 0 0 16px rgba(220,38,38,0); }
}
.rec-btn.processing {
  background: var(--gold);
  cursor: not-allowed;
  animation: none;
}

.status-line {
  font-size: 0.8rem;
  color: var(--dim);
  min-height: 1.2rem;
  text-align: center;
}
.status-line.recording { color: #fca5a5; }
.status-line.done { color: #86efac; }
.status-line.err { color: #fca5a5; }
.status-line.processing { color: var(--gold); }

.playback-wrap {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.8rem 1rem;
  display: none;
  flex-direction: column;
  gap: 0.4rem;
}
.playback-wrap.visible { display: flex; }
.playback-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dim);
}
audio { width: 100%; border-radius: 6px; }

.transcript-wrap {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: none;
}
.transcript-wrap.visible { display: block; }
.transcript-head {
  padding: 0.5rem 1rem;
  border-bottom: 1px solid var(--border);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dim);
  display: flex;
  justify-content: space-between;
}
.transcript-head span { color: #86efac; }
textarea#transcript {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  line-height: 1.6;
  padding: 0.8rem 1rem;
  resize: vertical;
  min-height: 100px;
}

.gen-btn {
  width: 100%;
  padding: 0.8rem;
  background: var(--gold);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  display: none;
}
.gen-btn.visible { display: block; }
.gen-btn:hover { opacity: 0.88; }

.new-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: 6px;
  padding: 0.4rem 1rem;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  display: none;
}
.new-btn.visible { display: inline-block; }
.new-btn:hover { border-color: var(--cream); color: var(--cream); }

.retry-btn {
  background: var(--gold);
  border: none;
  border-radius: 6px;
  color: white;
  padding: 0.4rem 1rem;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  display: none;
}
.retry-btn.visible { display: inline-block; }
.retry-btn:hover { opacity: 0.85; }

.minuta-screen {
  background: var(--paper);
  border-radius: 12px;
  overflow: hidden;
  width: 100%;
  color: var(--navy);
}
.minuta-toolbar {
  background: var(--navy);
  padding: 0.7rem 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.minuta-toolbar h2 {
  font-family: 'EB Garamond', serif;
  font-size: 1rem;
  color: var(--cream);
}
.toolbar-btns { display: flex; gap: 0.3rem; flex-wrap: wrap; }
.tbtn {
  padding: 0.3rem 0.8rem;
  border-radius: 5px;
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.tbtn-back {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--dim);
}
.tbtn-back:hover { border-color: var(--cream); color: var(--cream); }
.tbtn-copy {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--cream);
}
.tbtn-copy:hover { background: rgba(255,255,255,0.15); }
.tbtn-dl {
  background: var(--gold);
  border: none;
  color: white;
}
.tbtn-dl:hover { opacity: 0.88; }

.minuta-doc {
  padding: 1.5rem 2rem;
  font-family: 'EB Garamond', serif;
  font-size: 0.95rem;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 250px;
}
@media(max-width:520px){ .minuta-doc { padding: 1rem; } }

.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: #1e2d4a;
  color: var(--cream);
  border: 1px solid var(--gold);
  padding: 0.5rem 1.2rem;
  border-radius: 30px;
  font-size: 0.75rem;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 999;
}
.toast.show { opacity: 1; }

@media(max-width:480px){
  .rec-btn { width: 72px; height: 72px; font-size: 1.5rem; }
  .rec-ring { width: 90px; height: 90px; }
  .timer { font-size: 2.2rem; }
  .key-pill input { width: 80px; font-size: 0.6rem; }
}
</style>
</head>
<body>

<header>
  <div class="brand">⚖ Minutas<em>Jurídicas</em></div>
  <div id="key-area">
    <div class="key-pill" id="key-pill">
      <input type="password" id="api-key-openai" placeholder="OpenAI Key" style="width:120px;"/>
      <input type="password" id="api-key-anthropic" placeholder="Anthropic Key" style="width:120px;"/>
      <button class="key-btn" onclick="saveKeys()">Guardar</button>
    </div>
    <span id="key-status">● Conectado</span>
  </div>
</header>

<main>
  <div class="screen active" id="screen-rec">
    <div class="wave-wrap">
      <canvas id="waveform"></canvas>
      <div class="wave-idle" id="wave-idle">El audio aparecerá aquí al grabar</div>
    </div>

    <div class="timer" id="timer">00:00</div>
    <div class="timer-label" id="timer-label">Listo para grabar</div>

    <div class="rec-ring">
      <button class="rec-btn" id="rec-btn" onclick="toggleRecording()">🎙</button>
    </div>

    <div class="status-line" id="status">Presiona el botón para comenzar</div>

    <div class="playback-wrap" id="playback-wrap">
      <div class="playback-label">🎧 Escuchar grabación</div>
      <audio id="audio-player" controls></audio>
    </div>

    <div class="transcript-wrap" id="transcript-wrap">
      <div class="transcript-head">
        📝 Transcripción <span id="transcript-badge"></span>
      </div>
      <textarea id="transcript" placeholder="La transcripción aparecerá automáticamente al grabar…"></textarea>
    </div>

    <div style="display:flex; gap:0.5rem; width:100%; flex-wrap:wrap; justify-content:center;">
      <button class="retry-btn" id="retry-btn" onclick="retryTranscription()">
        🔄 Reintentar transcripción
      </button>
    </div>

    <button class="gen-btn" id="gen-btn" onclick="generateMinuta()">
      Generar Minuta →
    </button>
    <button class="new-btn" id="new-btn" onclick="resetRecorder()">
      + Nueva grabación
    </button>
  </div>

  <div class="screen" id="screen-minuta">
    <div class="minuta-screen">
      <div class="minuta-toolbar">
        <h2>📄 Minuta generada</h2>
        <div class="toolbar-btns">
          <button class="tbtn tbtn-back" onclick="showScreen('rec')">← Volver</button>
          <button class="tbtn tbtn-copy" onclick="copyMinuta()">Copiar</button>
          <button class="tbtn tbtn-dl" onclick="downloadMinuta()">⬇ .txt</button>
        </div>
      </div>
      <div class="minuta-doc" id="minuta-doc"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
// 1. CARGAR CLAVES GUARDADAS AL INICIAR
// ════════════════════════════════════════════════════════════
let apiKeyOpenAI = localStorage.getItem('openai_key') || '';
let apiKeyAnthropic = localStorage.getItem('anthropic_key') || '';

// Si ambas claves existen, ocultar inputs y mostrar "Conectado"
if (apiKeyOpenAI && apiKeyAnthropic) {
  document.getElementById('key-pill').style.display = 'none';
  document.getElementById('key-status').classList.add('visible');
}

// ════════════════════════════════════════════════════════════
// 2. GUARDAR CLAVES
// ════════════════════════════════════════════════════════════
function saveKeys() {
  const openai = document.getElementById('api-key-openai').value.trim();
  const anthropic = document.getElementById('api-key-anthropic').value.trim();
  if (openai) {
    apiKeyOpenAI = openai;
    localStorage.setItem('openai_key', openai);
  }
  if (anthropic) {
    apiKeyAnthropic = anthropic;
    localStorage.setItem('anthropic_key', anthropic);
  }
  if (openai || anthropic) {
    if (apiKeyOpenAI && apiKeyAnthropic) {
      document.getElementById('key-pill').style.display = 'none';
      document.getElementById('key-status').classList.add('visible');
    }
    showToast('Claves guardadas ✓');
  }
}

// ════════════════════════════════════════════════════════════
// 3. RESTO DEL CÓDIGO (grabación, waveform, transcripción, minuta)
// ════════════════════════════════════════════════════════════
// (Aquí va todo el resto de funciones: toggleRecording, startRecording,
// stopRecording, onRecordingStop, transcribeAudio, retryTranscription,
// generateMinuta, etc. - las mismas que ya tenías pero con las variables
// apiKeyOpenAI y apiKeyAnthropic actualizadas)

// Para no repetir todo el código (que es largo), te aseguro que el código
// completo ya está en el bloque de arriba. Solo copia y pega todo.
</script>
</body>
</html>
