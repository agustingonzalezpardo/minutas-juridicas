<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grabadora · Minutas Jurídicas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --navy:   #1a2740;
  --navy2:  #243555;
  --gold:   #b8922a;
  --cream:  #f7f4ef;
  --paper:  #ffffff;
  --mid:    #6b7280;
  --border: #ddd8d0;
  --rec:    #dc2626;
  --green:  #16a34a;
  --dim:    #94a3b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--navy);
  color: var(--cream);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  padding: 1.1rem 1.5rem .9rem;
  border-bottom: 1px solid rgba(255,255,255,.07);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.brand {
  font-family: 'EB Garamond', serif;
  font-size: 1.3rem;
  letter-spacing: .01em;
}
.brand em { color: var(--gold); font-style: normal; }

#key-area {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.key-pill {
  display: flex;
  align-items: center;
  gap: .4rem;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px;
  padding: .3rem .3rem .3rem .75rem;
  font-size: .75rem;
}
.key-pill input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--cream);
  font-family: monospace;
  font-size: .75rem;
  width: 130px;
}
.key-pill input::placeholder { color: var(--dim); }
.key-btn {
  background: var(--gold);
  color: white;
  border: none;
  border-radius: 14px;
  padding: .25rem .65rem;
  font-size: .72rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s;
}
.key-btn:hover { opacity: .85; }
#key-status {
  display: none;
  font-size: 0.8rem;
  color: #86efac;
  font-weight: 600;
}

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1.25rem 3rem;
  gap: 2rem;
  max-width: 700px;
  width: 100%;
  margin: 0 auto;
}

.screen { display: none; width: 100%; }
.screen.active { display: flex; flex-direction: column; align-items: center; gap: 1.75rem; }

.wave-wrap {
  width: 100%;
  height: 90px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}
canvas#waveform {
  width: 100%; height: 100%;
  display: block;
}
.wave-idle {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; color: var(--dim);
  pointer-events: none;
}

.rec-ring {
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.1);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.rec-ring::before {
  content: '';
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,.05);
}
.rec-btn {
  width: 96px; height: 96px;
  border-radius: 50%;
  border: none; cursor: pointer;
  background: var(--rec);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  transition: transform .15s, background .2s;
  position: relative;
  box-shadow: 0 0 0 0 rgba(220,38,38,.4);
}
.rec-btn:hover { transform: scale(1.04); }
.rec-btn.recording {
  background: #b91c1c;
  animation: pulse-big 1.4s ease-in-out infinite;
}
@keyframes pulse-big {
  0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,.5); }
  50%      { box-shadow: 0 0 0 18px rgba(220,38,38,0); }
}
.rec-btn.processing {
  background: var(--gold);
  cursor: not-allowed;
  animation: none;
}

.timer {
  font-size: 2.6rem;
  font-weight: 300;
  letter-spacing: .08em;
  font-variant-numeric: tabular-nums;
  color: var(--cream);
}
.timer-label {
  font-size: .72rem; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--dim); margin-top: -.5rem;
}
.timer-label.active { color: var(--rec); }

.status-line {
  font-size: .85rem; color: var(--dim);
  min-height: 1.2rem; text-align: center;
  transition: color .2s;
}
.status-line.recording { color: #fca5a5; }
.status-line.processing { color: var(--gold); }
.status-line.done { color: #86efac; }
.status-line.err  { color: #fca5a5; }

.playback-wrap {
  width: 100%;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  display: none;
  flex-direction: column;
  gap: .6rem;
}
.playback-wrap.visible { display: flex; }
.playback-label { font-size: .72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--dim); }
audio { width: 100%; outline: none; border-radius: 6px; }
audio::-webkit-media-controls-panel { background: #1e3050; }

.transcript-wrap {
  width: 100%;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  overflow: hidden;
  display: none;
}
.transcript-wrap.visible { display: block; }
.transcript-head {
  padding: .7rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,.07);
  font-size: .72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  color: var(--dim); display: flex; justify-content: space-between; align-items: center;
}
.transcript-head span { color: #86efac; font-weight: 600; }
textarea#transcript {
  width: 100%; background: transparent; border: none; outline: none;
  color: var(--cream); font-family: 'Inter', sans-serif; font-size: .88rem;
  line-height: 1.65; padding: 1rem; resize: vertical; min-height: 140px;
}

.gen-btn {
  width: 100%; padding: .9rem;
  background: var(--gold); border: none; border-radius: 8px;
  color: white; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
  display: none;
}
.gen-btn.visible { display: block; }
.gen-btn:hover { opacity: .88; }

.new-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,.15);
  color: var(--dim); border-radius: 6px;
  padding: .5rem 1.2rem; font-size: .8rem; font-weight: 600;
  cursor: pointer; transition: all .15s;
  display: none;
}
.new-btn.visible { display: inline-block; }
.new-btn:hover { border-color: var(--cream); color: var(--cream); }

.minuta-screen {
  background: var(--paper);
  border-radius: 12px;
  overflow: hidden;
  width: 100%;
  color: var(--navy);
}
.minuta-toolbar {
  background: var(--navy);
  padding: .85rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: .6rem;
}
.minuta-toolbar h2 {
  font-family: 'EB Garamond', serif;
  font-size: 1.1rem; color: var(--cream);
}
.toolbar-btns { display: flex; gap: .4rem; flex-wrap: wrap; }
.tbtn {
  padding: .4rem .9rem; border-radius: 5px;
  font-size: .76rem; font-weight: 700; cursor: pointer;
  transition: all .15s;
}
.tbtn-back { background: transparent; border: 1px solid rgba(255,255,255,.2); color: var(--dim); }
.tbtn-back:hover { border-color: var(--cream); color: var(--cream); }
.tbtn-copy { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: var(--cream); }
.tbtn-copy:hover { background: rgba(255,255,255,.15); }
.tbtn-dl { background: var(--gold); border: none; color: white; }
.tbtn-dl:hover { opacity: .88; }
.minuta-doc {
  padding: 2rem 2.25rem;
  font-family: 'EB Garamond', serif;
  font-size: 1rem; line-height: 1.8;
  white-space: pre-wrap; word-break: break-word;
  color: var(--navy); min-height: 300px;
}
@media(max-width:520px){ .minuta-doc { padding: 1.25rem; } }

.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--navy2); color: var(--cream);
  border: 1px solid var(--gold);
  padding: .6rem 1.4rem; border-radius: 30px;
  font-size: .8rem; font-weight: 600;
  opacity: 0; pointer-events: none; transition: opacity .3s;
  z-index: 999;
}
.toast.show { opacity: 1; }

@media(max-width:480px){
  .rec-btn { width: 80px; height: 80px; font-size: 1.6rem; }
  .rec-ring { width: 100px; height: 100px; }
  .timer { font-size: 2rem; }
}
</style>
</head>
<body>

<header>
  <div class="brand">⚖ Minutas<em>Jurídicas</em></div>
  <div id="key-area">
    <div class="key-pill" id="key-pill">
      <input type="password" id="api-key-input" placeholder="API Key Anthropic…"/>
      <button class="key-btn" onclick="saveKey()">Guardar</button>
    </div>
    <span id="key-status">● Conectado</span>
  </div>
</header>

<main>

  <div class="screen active" id="screen-rec">

    <div class="wave-wrap">
      <canvas id="waveform"></canvas>
      <div class="wave-idle" id="wave-idle">El audio aparecerá aquí al grabar</div>
    </div>

    <div class="timer" id="timer">00:00</div>
    <div class="timer-label" id="timer-label">Listo para grabar</div>

    <div class="rec-ring">
      <button class="rec-btn" id="rec-btn" onclick="toggleRecording()">🎙</button>
    </div>

    <div class="status-line" id="status">Presiona el botón para comenzar a grabar la reunión</div>

    <div class="playback-wrap" id="playback-wrap">
      <div class="playback-label">Escuchar grabación</div>
      <audio id="audio-player" controls></audio>
    </div>

    <div class="transcript-wrap" id="transcript-wrap">
      <div class="transcript-head">
        Transcripción <span id="transcript-badge"></span>
      </div>
      <textarea id="transcript" placeholder="La transcripción aparecerá aquí…"></textarea>
    </div>

    <button class="gen-btn" id="gen-btn" onclick="generateMinuta()">
      Generar Minuta →
    </button>
    <button class="new-btn" id="new-btn" onclick="resetRecorder()">
      + Nueva grabación
    </button>

  </div>

  <div class="screen" id="screen-minuta">
    <div class="minuta-screen">
      <div class="minuta-toolbar">
        <h2>Minuta generada</h2>
        <div class="toolbar-btns">
          <button class="tbtn tbtn-back" onclick="showScreen('rec')">← Volver</button>
          <button class="tbtn tbtn-copy" onclick="copyMinuta()">Copiar</button>
          <button class="tbtn tbtn-dl"   onclick="downloadMinuta()">⬇ .txt</button>
        </div>
      </div>
      <div class="minuta-doc" id="minuta-doc"></div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let apiKey        = '';
let mediaRecorder = null;
let audioChunks   = [];
let audioBlob     = null;
let timerInterval = null;
let seconds       = 0;
let isRecording   = false;

// Cargar clave guardada al iniciar
const savedKey = localStorage.getItem('anthropic_key');
if (savedKey) {
  apiKey = savedKey;
  document.getElementById('key-pill').style.display = 'none';
  document.getElementById('key-status').style.display = 'block';
}

// Waveform
let audioCtx      = null;
let analyser      = null;
let waveRAF       = null;
let micStream     = null;

// ════════════════════════════════════════════════════════════
//  API KEY
// ════════════════════════════════════════════════════════════
function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) return;
  apiKey = k;
  localStorage.setItem('anthropic_key', k);
  document.getElementById('key-pill').style.display = 'none';
  document.getElementById('key-status').style.display = 'block';
  showToast('API Key guardada ✓');
}

// ════════════════════════════════════════════════════════════
//  SCREEN SWITCH
// ════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ════════════════════════════════════════════════════════════
//  WAVEFORM
// ════════════════════════════════════════════════════════════
function startWaveform(stream) {
  audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
  analyser  = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);

  const canvas = document.getElementById('waveform');
  const ctx    = canvas.getContext('2d');
  document.getElementById('wave-idle').style.display = 'none';

  function draw() {
    waveRAF = requestAnimationFrame(draw);
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const barW = (canvas.width / data.length) * 2.2;
    let x = 0;
    for (let i = 0; i < data.length; i++) {
      const h = (data[i] / 255) * canvas.height;
      const alpha = 0.4 + (data[i] / 255) * 0.6;
      ctx.fillStyle = `rgba(184,146,42,${alpha})`;
      ctx.fillRect(x, canvas.height - h, barW - 1, h);
      x += barW;
    }
  }
  draw();
}

function stopWaveform() {
  if (waveRAF) { cancelAnimationFrame(waveRAF); waveRAF = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  const canvas = document.getElementById('waveform');
  const ctx    = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('wave-idle').style.display = 'flex';
}

// ════════════════════════════════════════════════════════════
//  TIMER
// ════════════════════════════════════════════════════════════
function startTimer() {
  seconds = 0;
  updateTimerDisplay();
  timerInterval = setInterval(() => { seconds++; updateTimerDisplay(); }, 1000);
}
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}
function updateTimerDisplay() {
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  document.getElementById('timer').textContent = `${m}:${s}`;
}

// ════════════════════════════════════════════════════════════
//  RECORDING
// ════════════════════════════════════════════════════════════
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  if (!navigator.mediaDevices) {
    setStatus('Tu navegador no soporta grabación de audio.', 'err');
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    setStatus('Permiso de micrófono denegado. Habilítalo en tu navegador.', 'err');
    return;
  }

  audioChunks = [];
  const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']
    .find(m => MediaRecorder.isTypeSupported(m)) || '';
  mediaRecorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = onRecordingStop;
  mediaRecorder.start(200);

  isRecording = true;
  startTimer();
  startWaveform(micStream);

  const btn = document.getElementById('rec-btn');
  btn.classList.add('recording');
  btn.textContent = '⏹';
  document.getElementById('timer-label').textContent = 'Grabando…';
  document.getElementById('timer-label').classList.add('active');
  setStatus('Grabando la reunión… Presiona ⏹ para detener', 'recording');
  document.getElementById('playback-wrap').classList.remove('visible');
  document.getElementById('transcript-wrap').classList.remove('visible');
  document.getElementById('gen-btn').classList.remove('visible');
  document.getElementById('new-btn').classList.remove('visible');
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  micStream?.getTracks().forEach(t => t.stop());
  stopTimer();
  stopWaveform();
  isRecording = false;

  const btn = document.getElementById('rec-btn');
  btn.classList.remove('recording');
  btn.classList.add('processing');
  btn.textContent = '⏳';
  document.getElementById('timer-label').textContent = 'Procesando…';
  document.getElementById('timer-label').classList.remove('active');
  setStatus('Procesando el audio…', 'processing');
}

async function onRecordingStop() {
  audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });

  const player = document.getElementById('audio-player');
  player.src = URL.createObjectURL(audioBlob);
  document.getElementById('playback-wrap').classList.add('visible');

  const btn = document.getElementById('rec-btn');
  btn.classList.remove('processing');
  btn.textContent = '🎙';
  document.getElementById('new-btn').classList.add('visible');

  if (!apiKey) {
    setStatus('Grabación lista. Ingresa tu API Key para transcribir automáticamente.', 'done');
    document.getElementById('transcript-wrap').classList.add('visible');
    document.getElementById('transcript-badge').textContent = '';
    document.getElementById('gen-btn').classList.add('visible');
    return;
  }

  setStatus('Transcribiendo con IA…', 'processing');
  try {
    const transcript = await transcribeAudio(audioBlob);
    document.getElementById('transcript').value = transcript;
    document.getElementById('transcript-badge').textContent = '✓ Lista';
    document.getElementById('transcript-wrap').classList.add('visible');
    document.getElementById('gen-btn').classList.add('visible');
    setStatus('Transcripción completa. Revísala y genera la minuta.', 'done');
  } catch(e) {
    setStatus(`Error al transcribir: ${e.message}`, 'err');
    document.getElementById('transcript-wrap').classList.add('visible');
    document.getElementById('gen-btn').classList.add('visible');
  }
}

// ════════════════════════════════════════════════════════════
//  TRANSCRIPTION via Claude Audio API
// ════════════════════════════════════════════════════════════
async function transcribeAudio(blob) {
  const b64 = await blobToBase64(blob);
  const mediaType = blob.type.split(';')[0] || 'audio/webm';

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-beta': 'audios-2025-05-14'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4000,
      system: `Eres un asistente legal chileno especializado en transcripción de reuniones jurídicas.
Transcribe el audio con exactitud. Identifica los hablantes si es posible (Abogado / Cliente).
Corrige errores de pronunciación, mantén nombres propios y términos jurídicos.
Entrega solo la transcripción limpia, sin comentarios adicionales.`,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'audio',
            source: { type: 'base64', media_type: mediaType, data: b64 }
          },
          { type: 'text', text: 'Transcribe esta grabación de reunión jurídica.' }
        ]
      }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Error ${res.status}`);
  }
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('').trim() || '';
}

// ════════════════════════════════════════════════════════════
//  GENERATE MINUTA via Claude
// ════════════════════════════════════════════════════════════
async function generateMinuta() {
  const transcript = document.getElementById('transcript').value.trim();
  if (!transcript) {
    showToast('Escribe o transcribe algo primero');
    return;
  }

  const btn = document.getElementById('gen-btn');
  btn.textContent = 'Generando minuta…';
  btn.disabled = true;
  setStatus('Generando minuta jurídica con IA…', 'processing');

  const fecha = new Date().toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });
  const hora  = new Date().toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });

  let minutaText = '';

  if (!apiKey) {
    minutaText = buildBasicMinuta(transcript, fecha, hora);
  } else {
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2000,
          system: `Eres un abogado chileno experto en redactar minutas de audiencia de juicio.
A partir de la transcripción de la reunión, extrae la información relevante y redacta una minuta formal.

La minuta DEBE tener exactamente este formato (completa con lo que puedas extraer, deja en blanco lo que no aparezca):

================================================================
      MINUTA DE AUDIENCIA DE JUICIO — PARTE DEMANDANTE
================================================================
Fecha: ${fecha}     Hora: ${hora}

DATOS DEL CLIENTE
────────────────────────────────────────────────────────────────
Cliente  : [nombre]
Abogado  : [nombre]
Correo   : [correo]
Teléfono : [teléfono]

ANTECEDENTES DEL PROCEDIMIENTO
────────────────────────────────────────────────────────────────
Procedimiento : [tipo]
Materia       : [materia]
RIT           : [RIT]
Caratulado    : [caratulado]
Tribunal      : [tribunal]
Demandante    : [nombre]
Demandado     : [nombre]

I. HECHOS PACÍFICOS
────────────────────────────────────────────────────────────────
  1. [hecho]
  2. [hecho]

II. HECHOS CONTROVERTIDOS
────────────────────────────────────────────────────────────────
  1. [hecho]
  2. [hecho]

III. SOLICITUD DE ALIMENTOS
────────────────────────────────────────────────────────────────
Monto solicitado: [monto]

Necesidades del alimentario:

          messages: [{
            role: 'user',
            content: `Aquí está la transcripción de la reunión:\n\n${transcript}`
          }]
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `Error ${res.status}`);
      }
      const data = await res.json();
      minutaText = data.content?.map(c => c.text || '').join('').trim();
    } catch(e) {
      minutaText = buildBasicMinuta(transcript, fecha, hora);
      showToast(`IA no disponible, minuta básica generada`);
    }
  }

  document.getElementById('minuta-doc').textContent = minutaText;
  btn.textContent = 'Generar Minuta →';
  btn.disabled = false;
  setStatus('Minuta generada.', 'done');
  showScreen('minuta');
}

function buildBasicMinuta(transcript, fecha, hora) {
  return `================================================================
      MINUTA DE AUDIENCIA DE JUICIO — PARTE DEMANDANTE
================================================================
Fecha: ${fecha}     Hora: ${hora}

TRANSCRIPCIÓN DE LA REUNIÓN
────────────────────────────────────────────────────────────────
${transcript}

================================================================`;
}

// ════════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════════
function resetRecorder() {
  audioBlob = null;
  audioChunks = [];
  document.getElementById('audio-player').src = '';
  document.getElementById('transcript').value = '';
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('timer-label').textContent = 'Listo para grabar';
  document.getElementById('timer-label').classList.remove('active');
  document.getElementById('playback-wrap').classList.remove('visible');
  document.getElementById('transcript-wrap').classList.remove('visible');
  document.getElementById('gen-btn').classList.remove('visible');
  document.getElementById('new-btn').classList.remove('visible');
  document.getElementById('transcript-badge').textContent = '';
  document.getElementById('wave-idle').style.display = 'flex';
  setStatus('Presiona el botón para comenzar a grabar la reunión', '');
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = `status-line ${type}`;
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function copyMinuta() {
  navigator.clipboard.writeText(document.getElementById('minuta-doc').textContent)
    .then(() => showToast('Copiado ✓'));
}

function downloadMinuta() {
  const txt  = document.getElementById('minuta-doc').textContent;
  const date = new Date().toLocaleDateString('es-CL').replace(/\//g,'-');
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([txt], { type:'text/plain;charset=utf-8' }));
  a.download = `minuta_${date}.txt`;
  a.click();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
