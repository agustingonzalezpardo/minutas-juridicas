<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minutas Jurídicas · Grabadora</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --navy: #0f1a2e;
  --gold: #b8942a;
  --cream: #f7f4ef;
  --paper: #ffffff;
  --rec: #dc2626;
  --dim: #94a3b8;
  --border: rgba(255,255,255,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--navy);
  color: var(--cream);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: rgba(0,0,0,0.2);
}
.brand {
  font-family: 'EB Garamond', serif;
  font-size: 1.2rem;
  letter-spacing: 0.02em;
}
.brand em { color: var(--gold); font-style: normal; }

#key-area {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.key-pill {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0.2rem 0.2rem 0.2rem 0.7rem;
}
.key-pill input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--cream);
  font-family: monospace;
  font-size: 0.7rem;
  width: 120px;
}
.key-pill input::placeholder { color: var(--dim); }
.key-btn {
  background: var(--gold);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 0.2rem 0.6rem;
  font-size: 0.65rem;
  font-weight: 700;
  cursor: pointer;
}
.key-btn:hover { opacity: 0.85; }
#key-status {
  display: none;
  font-size: 0.75rem;
  color: #86efac;
  font-weight: 500;
}
#key-status.visible { display: block; }

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 2rem;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
}

.screen { display: none; width: 100%; }
.screen.active { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }

.wave-wrap {
  width: 100%;
  height: 80px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
canvas#waveform {
  width: 100%;
  height: 100%;
  display: block;
}
.wave-idle {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--dim);
  pointer-events: none;
}

.timer {
  font-size: 2.8rem;
  font-weight: 300;
  letter-spacing: 0.06em;
  font-variant-numeric: tabular-nums;
  margin-top: -0.5rem;
}
.timer-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: -0.8rem;
}
.timer-label.active { color: var(--rec); }

.rec-ring {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.rec-btn {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: var(--rec);
  font-size: 2rem;
  transition: transform 0.15s, background 0.2s;
  box-shadow: 0 0 0 0 rgba(220,38,38,0.3);
}
.rec-btn:hover { transform: scale(1.04); }
.rec-btn.recording {
  background: #b91c1c;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
  50% { box-shadow: 0 0 0 16px rgba(220,38,38,0); }
}
.rec-btn.processing {
  background: var(--gold);
  cursor: not-allowed;
  animation: none;
}

.status-line {
  font-size: 0.8rem;
  color: var(--dim);
  min-height: 1.2rem;
  text-align: center;
}
.status-line.recording { color: #fca5a5; }
.status-line.done { color: #86efac; }
.status-line.err { color: #fca5a5; }
.status-line.processing { color: var(--gold); }

.playback-wrap {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.8rem 1rem;
  display: none;
  flex-direction: column;
  gap: 0.4rem;
}
.playback-wrap.visible { display: flex; }
.playback-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dim);
}
audio { width: 100%; border-radius: 6px; }

.transcript-wrap {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: none;
}
.transcript-wrap.visible { display: block; }
.transcript-head {
  padding: 0.5rem 1rem;
  border-bottom: 1px solid var(--border);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dim);
  display: flex;
  justify-content: space-between;
}
.transcript-head span { color: #86efac; }
textarea#transcript {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  line-height: 1.6;
  padding: 0.8rem 1rem;
  resize: vertical;
  min-height: 100px;
}

.gen-btn {
  width: 100%;
  padding: 0.8rem;
  background: var(--gold);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  display: none;
}
.gen-btn.visible { display: block; }
.gen-btn:hover { opacity: 0.88; }

.new-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: 6px;
  padding: 0.4rem 1rem;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  display: none;
}
.new-btn.visible { display: inline-block; }
.new-btn:hover { border-color: var(--cream); color: var(--cream); }

.minuta-screen {
  background: var(--paper);
  border-radius: 12px;
  overflow: hidden;
  width: 100%;
  color: var(--navy);
}
.minuta-toolbar {
  background: var(--navy);
  padding: 0.7rem 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.minuta-toolbar h2 {
  font-family: 'EB Garamond', serif;
  font-size: 1rem;
  color: var(--cream);
}
.toolbar-btns { display: flex; gap: 0.3rem; flex-wrap: wrap; }
.tbtn {
  padding: 0.3rem 0.8rem;
  border-radius: 5px;
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.tbtn-back {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--dim);
}
.tbtn-back:hover { border-color: var(--cream); color: var(--cream); }
.tbtn-copy {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--cream);
}
.tbtn-copy:hover { background: rgba(255,255,255,0.15); }
.tbtn-dl {
  background: var(--gold);
  border: none;
  color: white;
}
.tbtn-dl:hover { opacity: 0.88; }

.minuta-doc {
  padding: 1.5rem 2rem;
  font-family: 'EB Garamond', serif;
  font-size: 0.95rem;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 250px;
}
@media(max-width:520px){ .minuta-doc { padding: 1rem; } }

.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: #1e2d4a;
  color: var(--cream);
  border: 1px solid var(--gold);
  padding: 0.5rem 1.2rem;
  border-radius: 30px;
  font-size: 0.75rem;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 999;
}
.toast.show { opacity: 1; }

@media(max-width:480px){
  .rec-btn { width: 72px; height: 72px; font-size: 1.5rem; }
  .rec-ring { width: 90px; height: 90px; }
  .timer { font-size: 2.2rem; }
}
</style>
</head>
<body>

<header>
  <div class="brand">⚖ Minutas<em>Jurídicas</em></div>
  <div id="key-area">
    <div class="key-pill" id="key-pill">
      <input type="password" id="api-key-input" placeholder="API Key"/>
      <button class="key-btn" onclick="saveKey()">Guardar</button>
    </div>
    <span id="key-status">● Conectado</span>
  </div>
</header>

<main>
  <div class="screen active" id="screen-rec">
    <div class="wave-wrap">
      <canvas id="waveform"></canvas>
      <div class="wave-idle" id="wave-idle">El audio aparecerá aquí al grabar</div>
    </div>

    <div class="timer" id="timer">00:00</div>
    <div class="timer-label" id="timer-label">Listo para grabar</div>

    <div class="rec-ring">
      <button class="rec-btn" id="rec-btn" onclick="toggleRecording()">🎙</button>
    </div>

    <div class="status-line" id="status">Presiona el botón para comenzar</div>

    <div class="playback-wrap" id="playback-wrap">
      <div class="playback-label">🎧 Escuchar grabación</div>
      <audio id="audio-player" controls></audio>
    </div>

    <div class="transcript-wrap" id="transcript-wrap">
      <div class="transcript-head">
        📝 Transcripción <span id="transcript-badge"></span>
      </div>
      <textarea id="transcript" placeholder="La transcripción aparecerá aquí… (puedes editarla manualmente)"></textarea>
    </div>

    <!-- Botón para transcribir manualmente (opcional) -->
    <button class="gen-btn" id="gen-btn" onclick="generateMinuta()">
      Generar Minuta →
    </button>
    <button class="new-btn" id="new-btn" onclick="resetRecorder()">
      + Nueva grabación
    </button>
  </div>

  <div class="screen" id="screen-minuta">
    <div class="minuta-screen">
      <div class="minuta-toolbar">
        <h2>📄 Minuta generada</h2>
        <div class="toolbar-btns">
          <button class="tbtn tbtn-back" onclick="showScreen('rec')">← Volver</button>
          <button class="tbtn tbtn-copy" onclick="copyMinuta()">Copiar</button>
          <button class="tbtn tbtn-dl" onclick="downloadMinuta()">⬇ .txt</button>
        </div>
      </div>
      <div class="minuta-doc" id="minuta-doc"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let apiKey = '';
let mediaRecorder = null;
let audioChunks = [];
let audioBlob = null;
let timerInterval = null;
let seconds = 0;
let isRecording = false;

// Cargar clave guardada
const savedKey = localStorage.getItem('anthropic_key');
if (savedKey) {
  apiKey = savedKey;
  document.getElementById('key-pill').style.display = 'none';
  document.getElementById('key-status').classList.add('visible');
}

// Waveform
let audioCtx = null;
let analyser = null;
let waveRAF = null;
let micStream = null;

// ════════════════════════════════════════════════════════════
// API KEY
// ════════════════════════════════════════════════════════════
function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) return;
  apiKey = k;
  localStorage.setItem('anthropic_key', k);
  document.getElementById('key-pill').style.display = 'none';
  document.getElementById('key-status').classList.add('visible');
  showToast('API Key guardada ✓');
}

// ════════════════════════════════════════════════════════════
// SCREEN SWITCH
// ════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ════════════════════════════════════════════════════════════
// WAVEFORM
// ════════════════════════════════════════════════════════════
function startWaveform(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);

  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  document.getElementById('wave-idle').style.display = 'none';

  function draw() {
    waveRAF = requestAnimationFrame(draw);
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const barW = (canvas.width / data.length) * 2.2;
    let x = 0;
    for (let i = 0; i < data.length; i++) {
      const h = (data[i] / 255) * canvas.height;
      const alpha = 0.4 + (data[i] / 255) * 0.6;
      ctx.fillStyle = `rgba(184,146,42,${alpha})`;
      ctx.fillRect(x, canvas.height - h, barW - 1, h);
      x += barW;
    }
  }
  draw();
}

function stopWaveform() {
  if (waveRAF) { cancelAnimationFrame(waveRAF); waveRAF = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('wave-idle').style.display = 'flex';
}

// ════════════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════════════
function startTimer() {
  seconds = 0;
  updateTimerDisplay();
  timerInterval = setInterval(() => { seconds++; updateTimerDisplay(); }, 1000);
}
function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}
function updateTimerDisplay() {
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  document.getElementById('timer').textContent = `${m}:${s}`;
}

// ════════════════════════════════════════════════════════════
// RECORDING
// ════════════════════════════════════════════════════════════
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  if (!navigator.mediaDevices) {
    setStatus('Tu navegador no soporta grabación.', 'err');
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    setStatus('Permiso de micrófono denegado.', 'err');
    return;
  }

  audioChunks = [];
  const mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4']
    .find(m => MediaRecorder.isTypeSupported(m)) || '';
  mediaRecorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = onRecordingStop;
  mediaRecorder.start(200);

  isRecording = true;
  startTimer();
  startWaveform(micStream);

  const btn = document.getElementById('rec-btn');
  btn.classList.add('recording');
  btn.textContent = '⏹';
  document.getElementById('timer-label').textContent = 'Grabando…';
  document.getElementById('timer-label').classList.add('active');
  setStatus('Grabando… Presiona ⏹ para detener', 'recording');
  document.getElementById('playback-wrap').classList.remove('visible');
  document.getElementById('transcript-wrap').classList.remove('visible');
  document.getElementById('gen-btn').classList.remove('visible');
  document.getElementById('new-btn').classList.remove('visible');
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  micStream?.getTracks().forEach(t => t.stop());
  stopTimer();
  stopWaveform();
  isRecording = false;

  const btn = document.getElementById('rec-btn');
  btn.classList.remove('recording');
  btn.classList.add('processing');
  btn.textContent = '⏳';
  document.getElementById('timer-label').textContent = 'Procesando…';
  document.getElementById('timer-label').classList.remove('active');
  setStatus('Procesando el audio…', 'processing');
}

async function onRecordingStop() {
  audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });

  const player = document.getElementById('audio-player');
  player.src = URL.createObjectURL(audioBlob);
  document.getElementById('playback-wrap').classList.add('visible');

  const btn = document.getElementById('rec-btn');
  btn.classList.remove('processing');
  btn.textContent = '🎙';
  document.getElementById('new-btn').classList.add('visible');

  // Mostrar el área de transcripción y el botón de generar minuta SIEMPRE
  document.getElementById('transcript-wrap').classList.add('visible');
  document.getElementById('gen-btn').classList.add('visible');

  // Intentar transcripción automática solo si hay API Key
  if (apiKey) {
    setStatus('Transcribiendo con IA… (puede tomar unos segundos)', 'processing');
    try {
      // Llamar a transcribeAudio con timeout de 30 segundos
      const transcript = await Promise.race([
        transcribeAudio(audioBlob),
        new Promise((_, reject) => setTimeout(() => reject(new Error('Tiempo de espera agotado')), 30000))
      ]);
      document.getElementById('transcript').value = transcript;
      document.getElementById('transcript-badge').textContent = '✓ Lista';
      setStatus('Transcripción automática completada. Revísala y genera la minuta.', 'done');
    } catch (e) {
      setStatus(`Error en transcripción automática: ${e.message}. Puedes escribirla manualmente.`, 'err');
      document.getElementById('transcript-badge').textContent = '⚠️ Falló';
    }
  } else {
    setStatus('No hay API Key. Escribe la transcripción manualmente.', 'done');
    document.getElementById('transcript-badge').textContent = '✏️ Manual';
  }
}

// ════════════════════════════════════════════════════════════
// TRANSCRIPTION (Claude Audio API - experimental)
// ════════════════════════════════════════════════════════════
async function transcribeAudio(blob) {
  const b64 = await blobToBase64(blob);
  const mediaType = blob.type.split(';')[0] || 'audio/webm';

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-beta': 'audios-2025-05-14'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6', // o 'claude-3-5-sonnet-20241022'
      max_tokens: 4000,
      system: `Eres un asistente legal chileno especializado en transcripción de reuniones jurídicas.
Transcribe el audio con exactitud. Identifica los hablantes si es posible (Abogado / Cliente).
Corrige errores de pronunciación, mantén nombres propios y términos jurídicos.
Entrega solo la transcripción limpia, sin comentarios adicionales.`,
      messages: [{
        role: 'user',
        content: [
          { type: 'audio', source: { type: 'base64', media_type: mediaType, data: b64 } },
          { type: 'text', text: 'Transcribe esta grabación de reunión jurídica.' }
        ]
      }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Error HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('').trim() || '';
}

// ════════════════════════════════════════════════════════════
// GENERATE MINUTA
// ════════════════════════════════════════════════════════════
async function generateMinuta() {
  const transcript = document.getElementById('transcript').value.trim();
  if (!transcript) {
    showToast('Por favor, escribe o transcribe el audio primero.');
    return;
  }

  const btn = document.getElementById('gen-btn');
  btn.textContent = '⏳ Generando…';
  btn.disabled = true;
  setStatus('Generando minuta…', 'processing');

  const fecha = new Date().toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const hora = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });

  let minutaText = '';

  if (!apiKey) {
    // Sin API, usamos plantilla básica
    minutaText = buildBasicMinuta(transcript, fecha, hora);
  } else {
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2000,
          system: `Eres un abogado chileno experto en redactar minutas de audiencia de juicio.
A partir de la transcripción de la reunión, extrae la información relevante y redacta una minuta formal.

La minuta DEBE tener exactamente este formato (completa con lo que puedas extraer, deja en blanco lo que no aparezca):

================================================================
      MINUTA DE AUDIENCIA DE JUICIO — PARTE DEMANDANTE
================================================================
Fecha: ${fecha}     Hora: ${hora}

DATOS DEL CLIENTE
────────────────────────────────────────────────────────────────
Cliente  : [nombre]
Abogado  : [nombre]
Correo   : [correo]
Teléfono : [teléfono]

ANTECEDENTES DEL PROCEDIMIENTO
────────────────────────────────────────────────────────────────
Procedimiento : [tipo]
Materia       : [materia]
RIT           : [RIT]
Caratulado    : [caratulado]

          messages: [{ role: 'user', content: `Aquí está la transcripción:\n\n${transcript}` }]
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `Error ${res.status}`);
      }
      const data = await res.json();
      minutaText = data.content?.map(c => c.text || '').join('').trim();
    } catch (e) {
      minutaText = buildBasicMinuta(transcript, fecha, hora);
      showToast('⚠️ Error con la IA, se generó una minuta básica.');
    }
  }

  document.getElementById('minuta-doc').textContent = minutaText;
  btn.textContent = 'Generar Minuta →';
  btn.disabled = false;
  setStatus('Minuta generada ✓', 'done');
  showScreen('minuta');
}

function buildBasicMinuta(transcript, fecha, hora) {
  return `================================================================
      MINUTA DE AUDIENCIA DE JUICIO — PARTE DEMANDANTE
================================================================
Fecha: ${fecha}     Hora: ${hora}

TRANSCRIPCIÓN DE LA REUNIÓN
────────────────────────────────────────────────────────────────
${transcript}

================================================================`;
}

// ════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════
function resetRecorder() {
  audioBlob = null;
  audioChunks = [];
  document.getElementById('audio-player').src = '';
  document.getElementById('transcript').value = '';
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('timer-label').textContent = 'Listo para grabar';
  document.getElementById('timer-label').classList.remove('active');
  document.getElementById('playback-wrap').classList.remove('visible');
  document.getElementById('transcript-wrap').classList.remove('visible');
  document.getElementById('gen-btn').classList.remove('visible');
  document.getElementById('new-btn').classList.remove('visible');
  document.getElementById('transcript-badge').textContent = '';
  document.getElementById('wave-idle').style.display = 'flex';
  setStatus('Presiona el botón para comenzar', '');
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = `status-line ${type || ''}`;
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function copyMinuta() {
  navigator.clipboard.writeText(document.getElementById('minuta-doc').textContent)
    .then(() => showToast('Copiado ✓'));
}

function downloadMinuta() {
  const txt = document.getElementById('minuta-doc').textContent;
  const date = new Date().toLocaleDateString('es-CL').replace(/\//g, '-');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
  a.download = `minuta_${date}.txt`;
  a.click();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
